apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: uber
  namespace: uber
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.middlewares: uber-strip-service-prefix@kubernetescrd
spec:
  tls:
    - hosts:
        - uber.johnmayou.com
      secretName: uber-tls
  rules:
    - host: uber.johnmayou.com
      http:
        paths:
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: auth
                port:
                  number: 8080
          - path: /trip
            pathType: Prefix
            backend:
              service:
                name: trip
                port:
                  number: 8080
          - path: /user
            pathType: Prefix
            backend:
              service:
                name: user
                port:
                  number: 8080
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-service-prefix
  namespace: uber
spec:
  stripPrefixRegex:
    regex:
      - /[^/]+
