apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: uber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      imagePullSecrets:
        - name: pullsecret-ghcr
      containers:
        - name: auth
          image: ghcr.io/johnmayou/uber/services/auth:sha-91681c714665a7ff1d8b0169b5827ed61a121f03
          ports:
            - containerPort: 8080
