apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: uber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: auth
          image: ghcr.io/johnmayou/uber/services/auth:latest
          ports:
            - containerPort: 8080
