apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: uber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      imagePullSecrets:
        - name: pullsecret-ghcr
      containers:
        - name: user
          image: ghcr.io/johnmayou/uber/services/user:sha-91681c714665a7ff1d8b0169b5827ed61a121f03
          ports:
            - containerPort: 8080
