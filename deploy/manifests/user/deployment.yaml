apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: uber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
    spec:
      imagePullSecrets:
        - name: pullsecret-ghcr
      containers:
        - name: user
          image: ghcr.io/johnmayou/uber/services/user:sha-f26d3aeafda0bed119281c58f436d0ef0b64ea77
          ports:
            - containerPort: 8080
