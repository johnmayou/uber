apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip
  namespace: uber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip
  template:
    metadata:
      labels:
        app: trip
    spec:
      imagePullSecrets:
        - name: pullsecret-ghcr
      containers:
        - name: trip
          image: ghcr.io/johnmayou/uber/services/trip:sha-2a9784a304626b25ec2fb455d19074fcd24aaaa8
          ports:
            - containerPort: 8080
