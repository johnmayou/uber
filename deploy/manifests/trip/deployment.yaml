apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip
  namespace: uber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip
  template:
    metadata:
      labels:
        app: trip
    spec:
      imagePullSecrets:
        - name: pullsecret-ghcr
      containers:
        - name: trip
          image: ghcr.io/johnmayou/uber/services/trip:sha-f26d3aeafda0bed119281c58f436d0ef0b64ea77
          ports:
            - containerPort: 8080
