apiVersion: apps/v1
kind: Deployment
metadata:
  name: trip
  namespace: uber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trip
  template:
    metadata:
      labels:
        app: trip
    spec:
      imagePullSecrets:
        - name: pullsecret-ghcr
      containers:
        - name: trip
          image: ghcr.io/johnmayou/uber/services/trip:sha-78085cc7e9b5f869b62e42115a8e9e08da4fa33e
          ports:
            - containerPort: 8080
