name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'services/auth/**'
              - 'pkg/**'
            trip:
              - 'services/trip/**'
              - 'pkg/**'
            user:
              - 'services/user/**'
              - 'pkg/**'
      - name: Build matrix
        id: matrix
        run: |
          SERVICES=()
          [ "${{ steps.filter.outputs.auth }}" = "true" ] && SERVICES+=("auth")
          [ "${{ steps.filter.outputs.trip }}" = "true" ] && SERVICES+=("trip")
          [ "${{ steps.filter.outputs.user }}" = "true" ] && SERVICES+=("user")
          echo "services=$(jq -c -n '$ARGS.positional' --args "${SERVICES[@]+"${SERVICES[@]}"}")" >> $GITHUB_OUTPUT

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
          install-mode: goinstall
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform
      - run: make deploy-lint

  build:
    needs: detect
    if: needs.detect.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        env:
          TAG: sha-${{ github.sha }}
          SERVICE: ${{ matrix.service }}
        run: docker buildx bake "$SERVICE" --push
        working-directory: docker
