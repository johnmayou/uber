name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "deploy/manifests/**"
  pull_request:
    branches: [main]

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.matrix.outputs.services }}
      modules: ${{ steps.matrix.outputs.modules }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            auth:
              - 'services/auth/**'
              - 'pkg/**'
            trip:
              - 'services/trip/**'
              - 'pkg/**'
            user:
              - 'services/user/**'
              - 'pkg/**'
            chassis:
              - 'pkg/**'
      - name: Build matrix
        id: matrix
        run: |
          SERVICES=()
          MODULES=()
          [ "${{ steps.filter.outputs.chassis }}" = "true" ] && MODULES+=("pkg/chassis")
          [ "${{ steps.filter.outputs.auth }}" = "true" ] && SERVICES+=("auth") && MODULES+=("services/auth")
          [ "${{ steps.filter.outputs.trip }}" = "true" ] && SERVICES+=("trip") && MODULES+=("services/trip")
          [ "${{ steps.filter.outputs.user }}" = "true" ] && SERVICES+=("user") && MODULES+=("services/user")
          echo "services=$(jq -c -n '$ARGS.positional' --args "${SERVICES[@]+"${SERVICES[@]}"}")" >> $GITHUB_OUTPUT
          echo "modules=$(jq -c -n '$ARGS.positional' --args "${MODULES[@]+"${MODULES[@]}"}")" >> $GITHUB_OUTPUT

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh | sh -s -- -b $(go env GOPATH)/bin latest
      - run: bash scripts/ci-lint
      - name: Install kubeconform
        run: |
          curl -sSL https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz -C /usr/local/bin kubeconform
      - run: make deploy-lint

  test:
    needs: [detect, lint]
    if: needs.detect.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJson(needs.detect.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.work
      - run: bash scripts/ci-test ${{ matrix.module }}

  build:
    needs: [detect, test]
    if: needs.detect.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        env:
          TAG: sha-${{ github.sha }}
          SERVICE: ${{ matrix.service }}
        run: docker buildx bake "$SERVICE" --file docker/docker-bake.hcl --push

  deploy:
    needs: [detect, build]
    if: github.ref == 'refs/heads/main' && needs.detect.outputs.services != '[]'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy
      cancel-in-progress: false
    strategy:
      matrix:
        service: ${{ fromJson(needs.detect.outputs.services) }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Update image tag
        env:
          SHA_TAG: sha-${{ github.sha }}
          SERVICE: ${{ matrix.service }}
        run: |
          sed -i "s|image: ghcr.io/johnmayou/uber/services/${SERVICE}:.*|image: ghcr.io/johnmayou/uber/services/${SERVICE}:${SHA_TAG}|" deploy/manifests/${SERVICE}/deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/manifests/${SERVICE}/deployment.yaml
          git commit -m "chore: deploy ${SERVICE} ${SHA_TAG}"
          git push
